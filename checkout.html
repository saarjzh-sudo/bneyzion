<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>רכישה ותשלום – בני ציון</title>
    <meta name="description" content="עמוד תשלום ורכישת מנוי – בני ציון תנועה ללימוד תנ״ך" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #f8f7f4;
        color: #1a1a2e;
        direction: rtl;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        background: #1a1a2e;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header img { height: 40px; }
      header span {
        color: #d4a843;
        font-size: 1.25rem;
        font-weight: 700;
      }
      main {
        flex: 1;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 20px;
        width: 100%;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 8px;
        color: #1a1a2e;
      }
      .subtitle {
        color: #666;
        margin-bottom: 32px;
        font-size: 0.95rem;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 0.95rem;
        color: #333;
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      select {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        background: #fafafa;
        direction: rtl;
        color: #1a1a2e;
        transition: border-color 0.2s;
      }
      input:focus, select:focus {
        outline: none;
        border-color: #d4a843;
      }
      .tos-group {
        margin-top: 24px;
        padding: 16px;
        background: #f8f7f4;
        border-radius: 8px;
        border: 1px solid #e8e4da;
      }
      .tos-group label {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-weight: 400;
        line-height: 1.5;
        cursor: pointer;
      }
      .tos-group input[type="checkbox"] {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        margin-top: 2px;
        accent-color: #d4a843;
        cursor: pointer;
      }
      .tos-group a {
        color: #2563eb;
        text-decoration: underline;
      }
      .btn-submit {
        display: block;
        width: 100%;
        margin-top: 28px;
        padding: 14px;
        background: #d4a843;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-submit:hover { background: #b8913a; }
      .secure-note {
        text-align: center;
        margin-top: 16px;
        font-size: 0.8rem;
        color: #888;
      }
      footer {
        background: #1a1a2e;
        color: #aaa;
        text-align: center;
        padding: 20px;
        font-size: 0.8rem;
        line-height: 1.6;
      }
      footer a { color: #d4a843; text-decoration: none; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static fallback: shown to bots and users before React mounts -->
      <header>
        <img src="/lovable-uploads/logo-bney-zion.png" alt="לוגו בני ציון" />
        <span>בני ציון</span>
      </header>

      <main>
        <h1>רכישה ותשלום</h1>
        <p class="subtitle">השלימו את פרטיכם להמשך הרכישה</p>

        <div class="card">
          <form action="/checkout" method="get" id="checkout-form">
            <div style="display:flex; gap:16px;">
              <div class="form-group" style="flex:1;">
                <label for="first_name">שם פרטי</label>
                <input type="text" id="first_name" name="first_name" placeholder="ישראל" required autocomplete="given-name" />
              </div>
              <div class="form-group" style="flex:1;">
                <label for="last_name">שם משפחה</label>
                <input type="text" id="last_name" name="last_name" placeholder="ישראלי" required autocomplete="family-name" />
              </div>
            </div>

            <div class="form-group">
              <label for="email">דוא"ל (אימייל)</label>
              <input type="email" id="email" name="email" placeholder="name@example.com" required autocomplete="email" />
            </div>

            <div class="form-group">
              <label for="phone">מספר טלפון</label>
              <input type="tel" id="phone" name="phone" placeholder="05X-XXXXXXX" required autocomplete="tel" />
            </div>

            <div class="form-group">
              <label for="country">מדינה</label>
              <select id="country" name="country" required>
                <option value="IL" selected>ישראל</option>
                <option value="US">ארצות הברית</option>
                <option value="GB">בריטניה</option>
                <option value="FR">צרפת</option>
                <option value="CA">קנדה</option>
                <option value="AU">אוסטרליה</option>
                <option value="OTHER">אחר</option>
              </select>
            </div>

            <div class="tos-group">
              <label for="tos">
                <input type="checkbox" id="tos" name="tos" required />
                <span>
                  קראתי ואני מסכים/ה ל<a href="/terms" target="_blank">תקנון האתר</a>
                  ול<a href="/privacy-policy" target="_blank">מדיניות הפרטיות</a>.
                  אני מאשר/ת כי מלאו לי <strong>18 שנים ומעלה</strong> וכי אני כשיר/ה לרכישה.
                </span>
              </label>
            </div>

            <button type="submit" class="btn-submit">המשך לתשלום</button>
            <p class="secure-note">התשלום מאובטח בתקן PCI-DSS דרך Grow / Meshulam</p>
          </form>
        </div>
      </main>

      <footer>
        <p>מכלל יופי (ע"ר) | הרקפת 5, ירושלים | 053-470-6610 | office@bneyzion.co.il</p>
        <p style="margin-top:6px;">
          <a href="/terms">תקנון ומדיניות פרטיות</a>
          &nbsp;·&nbsp;
          <a href="/contact">צור קשר</a>
        </p>
      </footer>
    </div>

    <!-- React SPA takes over for real users -->
    <script type="module" src="/src/main.tsx"></script>
    <!-- Grow (Meshulam) Payment SDK -->
    <script src="https://cdn.meshulam.co.il/sdk/gs.min.js" async></script>
  </body>
</html>
